<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Mess Management - Registration & Authentication</title>
  <meta name="description" content="Secure registration form with Authorized Email OTP and Voice Search.">
  <link rel="stylesheet" href="style.css">
</head>
<body>

  <!-- Navigation Header -->
  <header>
    <nav class="navbar" aria-label="Main Navigation">
      <div class="nav-brand">MESS MANAGER</div>
      <ul class="nav-links">
        <li><a href="index.html" class="active" id="navLinkHome">Home</a></li>
        <li><a href="view.html" id="navLinkView">Data View</a></li>
      </ul>
    </nav>
  </header>

  <!-- Main Body Content -->
  <main>
    <section class="glass-panel form-card">
      <h2>Member Registration</h2>
      <p class="subtitle">Enter details and authenticate using authorized Email OTP to sign up</p>

      <!-- Custom notifications -->
      <div id="statusMessage" class="message" style="display: none;" role="alert"></div>

      <form id="registrationForm" novalidate>
        
        <!-- Name Field -->
        <div class="form-group">
          <label for="inputName" class="form-label">Full Name</label>
          <div class="input-container">
            <input type="text" id="inputName" class="form-input" placeholder="e.g. John Doe" required>
            <button type="button" class="mic-btn" id="btnMicName" title="Dictate Name" aria-label="Dictate Name">
              <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M12 2a3 3 0 0 0-3 3v7a3 3 0 0 0 6 0V5a3 3 0 0 0-3-3Z"/><path d="M19 10v2a7 7 0 0 1-14 0v-2"/><line x1="12" x2="12" y1="19" y2="22"/></svg>
            </button>
          </div>
        </div>

        <!-- PNO Field (Personal Number) -->
        <div class="form-group">
          <label for="inputPNO" class="form-label">Personal Number (PNO)</label>
          <div class="input-container">
            <input type="text" id="inputPNO" class="form-input" placeholder="e.g. P10024" required>
            <button type="button" class="mic-btn" id="btnMicPNO" title="Dictate PNO" aria-label="Dictate Personal Number">
              <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M12 2a3 3 0 0 0-3 3v7a3 3 0 0 0 6 0V5a3 3 0 0 0-3-3Z"/><path d="M19 10v2a7 7 0 0 1-14 0v-2"/><line x1="12" x2="12" y1="19" y2="22"/></svg>
            </button>
          </div>
        </div>

        <!-- Mobile Field -->
        <div class="form-group">
          <label for="inputMobile" class="form-label">Mobile Number</label>
          <div class="input-container">
            <input type="tel" id="inputMobile" class="form-input" placeholder="e.g. +91 9876543210" required>
            <button type="button" class="mic-btn" id="btnMicMobile" title="Dictate Mobile" aria-label="Dictate Mobile Number">
              <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M12 2a3 3 0 0 0-3 3v7a3 3 0 0 0 6 0V5a3 3 0 0 0-3-3Z"/><path d="M19 10v2a7 7 0 0 1-14 0v-2"/><line x1="12" x2="12" y1="19" y2="22"/></svg>
            </button>
          </div>
        </div>

        <!-- Email Field & Send OTP trigger -->
        <div class="form-group">
          <label for="inputEmail" class="form-label">Authorized Email Address</label>
          <div style="display: flex; gap: 0.5rem; margin-bottom: 0.5rem;">
            <div class="input-container" style="flex: 1;">
              <input type="email" id="inputEmail" class="form-input" placeholder="e.g. yourname@domain.com" required>
            </div>
            <button type="button" id="btnSendOtp" class="btn btn-secondary">Get OTP</button>
          </div>
          <span style="font-size: 0.8rem; color: var(--text-secondary);">An email verified on the database whitelist is required.</span>
        </div>

        <!-- OTP Verification Block -->
        <div id="otpSection" class="otp-section" style="display: none;">
          <div class="form-group">
            <label for="inputOtp" class="form-label">Verification OTP Code</label>
            <input type="text" id="inputOtp" class="form-input" maxlength="6" placeholder="Enter 6-digit OTP code" required>
          </div>
          <button type="submit" id="btnRegister" class="btn btn-primary" style="width: 100%; margin-top: 1.5rem;">
            Verify OTP & Submit Record
          </button>
        </div>

      </form>
    </section>
  </main>

  <!-- Sticky Footer -->
  <footer>
    <p>&copy; 2026 Mess Management System. Built with Antigravity IDE. All rights reserved.</p>
  </footer>

  <script src="app.js"></script>
</body>
</html>
